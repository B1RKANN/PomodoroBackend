image: node:20-bullseye

stages:
  - build
  - test
  - deploy

cache:
  paths:
    - node_modules/

install_and_build:
  stage: build
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - node_modules/
      - dist/
    expire_in: 1 hour
  only:
    - main

run_tests:
  stage: test
  script:
    - npm run test
  dependencies:
    - install_and_build
  only:
    - main

deploy_to_vps:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    - >
      ssh $SSH_USER@$SSH_IP "
      cd /opt/PomodoroBackend &&
      git pull origin main &&
      docker stop pomodoro-backend || true &&
      docker rm pomodoro-backend || true &&
      docker build -t pomodoro-backend-img . &&
      docker run -d --restart unless-stopped
      -p ${PORT:-5000}:${PORT:-5000}
      --name pomodoro-backend
      -e PORT=${PORT:-5000}
      -e MONGO_URI=$MONGO_URI
      -e JWT_SECRET=$JWT_SECRET
      -e REFRESH_TOKEN_SECRET=$REFRESH_TOKEN_SECRET
      pomodoro-backend-img
      "
  only:
    - main
